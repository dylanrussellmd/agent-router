<svg width="1280" height="320" viewBox="0 0 1280 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="omo-router banner">
  <title>omo-router</title>
  <desc>Banner: the omo-router mark on the left, the wordmark "omo-router" with a tagline "Switch between named stacks of oh-my-openagent.json model assignments." on the right.</desc>

  <!-- background -->
  <rect width="1280" height="320" rx="32" fill="#0F172A"/>

  <!-- subtle grid pattern -->
  <g opacity="0.06" stroke="#94A3B8" stroke-width="1">
    <path d="M0 80 L1280 80"/>
    <path d="M0 160 L1280 160"/>
    <path d="M0 240 L1280 240"/>
    <path d="M160 0 L160 320"/>
    <path d="M320 0 L320 320"/>
    <path d="M480 0 L480 320"/>
    <path d="M640 0 L640 320"/>
    <path d="M800 0 L800 320"/>
    <path d="M960 0 L960 320"/>
    <path d="M1120 0 L1120 320"/>
  </g>

  <!-- mark group (left) -->
  <g transform="translate(64, 64)">
    <!-- selector lane -->
    <line x1="-20" y1="-6" x2="-20" y2="170" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
    <!-- 3 cards -->
    <rect x="0" y="120" width="160" height="36" rx="9" fill="#334155"/>
    <rect x="14" y="134" width="48" height="8" rx="4" fill="#0F172A" fill-opacity="0.55"/>
    <rect x="0" y="68" width="160" height="36" rx="9" fill="#475569"/>
    <rect x="14" y="82" width="64" height="8" rx="4" fill="#0F172A" fill-opacity="0.55"/>
    <rect x="0" y="16" width="160" height="36" rx="9" fill="url(#bannerActive)"/>
    <rect x="14" y="30" width="40" height="8" rx="4" fill="#0F172A" fill-opacity="0.7"/>
    <rect x="0" y="16" width="160" height="36" rx="9" fill="none" stroke="#22D3EE" stroke-width="1.5" stroke-opacity="0.55"/>
    <!-- selector dot -->
    <circle cx="-20" cy="34" r="8" fill="#06B6D4"/>
    <circle cx="-20" cy="34" r="8" fill="none" stroke="#22D3EE" stroke-width="2" stroke-opacity="0.65"/>
  </g>

  <!-- wordmark + tagline (right) -->
  <g transform="translate(320, 132)">
    <text x="0" y="0" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="80" font-weight="700" fill="#F8FAFC">omo-router</text>
    <text x="0" y="56" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="22" fill="#94A3B8">Switch between named stacks of <tspan fill="#22D3EE">oh-my-openagent.json</tspan> model assignments.</text>
    <text x="0" y="92" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, sans-serif" font-size="18" fill="#64748B">opencode plugin + CLI &middot; one command, one restart, new model crew.</text>
  </g>

  <defs>
    <linearGradient id="bannerActive" x1="0" y1="16" x2="160" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0891B2"/>
      <stop offset="1" stop-color="#06B6D4"/>
    </linearGradient>
  </defs>
</svg>
